<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Cobble Cart</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../images/logo-page.png" type="image/png">
  <link rel="apple-touch-icon" href="../images/logo-page.png">
  <style>
    .shop-hero { background: var(--dark); padding: 40px; text-align: center; color: var(--white); }
    .shop-hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .shop-hero p { font-size: 14px; color: #aaa; margin-bottom: 24px; }
    .shop-search { display: flex; gap: 10px; max-width: 560px; margin: 0 auto; }
    .shop-search input { flex: 1; padding: 11px 16px; border: none; border-radius: 6px; font-size: 14px; font-family: var(--font); }
    .shop-search input:focus { outline: none; }
    .shop-layout { display: flex; gap: 24px; max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .filters-panel { width: 220px; flex-shrink: 0; }
    .filter-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .filter-card h4 { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .filter-option { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; color: var(--grey-dark); cursor: pointer; }
    .filter-option input { cursor: pointer; accent-color: var(--orange); }
    .products-panel { flex: 1; }
    .products-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .products-toolbar span { font-size: 13px; color: var(--grey-mid); }
    .products-toolbar select { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: var(--font); background: var(--white); }
    .cart-float { position: fixed; bottom: 28px; right: 28px; background: var(--orange); color: var(--dark); border: none; border-radius: 50px; padding: 14px 24px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 8px; z-index: 99; text-decoration: none; }
    .cart-float:hover { background: var(--orange-dark); color: var(--white); }
    .cart-badge { background: var(--dark); color: var(--white); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>

  <nav class="navbar">
          <a href="../index.html" class="navbar-logo">
      <img src="../images/logo-full.png" class="site-logo" alt="Cobble Cart">
    </a>
    <ul class="navbar-links">
      <li><a href="home.html">Browse</a></li>
      <li><a href="category.html">Categories</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="profile.html" style="color:#ccc;font-size:14px;">My account</a>
      <a href="cart.html" class="btn btn-primary">
        Basket <span id="cart-count" style="background:var(--dark);color:#fff;border-radius:50%;padding:2px 6px;font-size:11px;margin-left:4px;">0</span>
      </a>
    </div>
  </nav>

  <div class="shop-hero">
    <h2>Shop local, collect fresh</h2>
    <p>Browse products from all 5 Cleckhuddersfax traders</p>
    <div class="shop-search">
      <input type="text" id="search-input" placeholder="Search for products..." oninput="filterProducts()">
      <button class="btn btn-primary" onclick="filterProducts()">Search</button>
    </div>
  </div>

  <div class="shop-layout">
    <div class="filters-panel">
      <div class="filter-card">
        <h4>Shop</h4>
        <label class="filter-option"><input type="checkbox" value="butcher" onchange="filterProducts()"> Butcher</label>
        <label class="filter-option"><input type="checkbox" value="greengrocer" onchange="filterProducts()"> Greengrocer</label>
        <label class="filter-option"><input type="checkbox" value="fishmonger" onchange="filterProducts()"> Fishmonger</label>
        <label class="filter-option"><input type="checkbox" value="bakery" onchange="filterProducts()"> Bakery</label>
        <label class="filter-option"><input type="checkbox" value="delicatessen" onchange="filterProducts()"> Delicatessen</label>
      </div>
      <div class="filter-card">
        <h4>Price range</h4>
        <label class="filter-option"><input type="radio" name="price" value="all" checked onchange="filterProducts()"> All prices</label>
        <label class="filter-option"><input type="radio" name="price" value="under5" onchange="filterProducts()"> Under $5</label>
        <label class="filter-option"><input type="radio" name="price" value="5to10" onchange="filterProducts()"> $5 – $10</label>
        <label class="filter-option"><input type="radio" name="price" value="over10" onchange="filterProducts()"> Over $10</label>
      </div>
    </div>

    <div class="products-panel">
      <div class="products-toolbar">
        <span id="product-count">Showing all products</span>
        <select onchange="sortProducts(this.value)">
          <option value="default">Sort by: Default</option>
          <option value="price-asc">Price: Low to high</option>
          <option value="price-desc">Price: High to low</option>
          <option value="name">Name: A to Z</option>
        </select>
      </div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </div>

  <a href="cart.html" class="cart-float">
    View basket <span class="cart-badge" id="cart-count-float">0</span>
  </a>

  <footer class="footer">
    <div class="footer-bottom">&copy; 2026 Cobble Cart. All rights reserved.</div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    let allProducts = [];
    let displayProducts = [];

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      document.getElementById('product-count').textContent = 'Showing ' + displayProducts.length + ' products';
      if (displayProducts.length === 0) {
        grid.innerHTML = '<p style="color:var(--grey-mid);font-size:14px;">No products found.</p>';
        return;
      }
      grid.innerHTML = displayProducts.map(p => `
        <div class="product-card" onclick="window.location='product-details.html?id=${p.id}'">
          <div class="product-img">
            ${p.image
              ? `<img src="../${p.image}" alt="${p.name}">`
              : `<div style="height:160px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;">No image</div>`}
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-shop">${p.shop}</div>
            <div class="product-price">${renderPrice(p)}</div>
            ${p.allergy && p.allergy !== 'None' ? `<div style="font-size:11px;color:#888;margin-bottom:8px;">Allergy: ${p.allergy}</div>` : ''}
            <button class="btn btn-primary btn-full"
              ${p.stock <= 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}
              onclick="event.stopPropagation(); addToCart(${p.id}, ${JSON.stringify(p.name)}, ${p.price}, ${JSON.stringify(p.shop)}, { originalPrice: ${p.originalPrice}, offerPercent: ${p.offerPercent} })">
              ${p.stock <= 0 ? 'Out of stock' : 'Add to basket'}
            </button>
          </div>
        </div>
      `).join('');
    }

    function filterProducts() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const checkedShops = [...document.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
      const priceFilter = document.querySelector('input[name=price]:checked').value;
      displayProducts = allProducts.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) || p.shop.toLowerCase().includes(search);
        const matchShop = checkedShops.length === 0 || checkedShops.includes(p.shopType);
        let matchPrice = true;
        if (priceFilter === 'under5') matchPrice = p.price < 5;
        if (priceFilter === '5to10') matchPrice = p.price >= 5 && p.price <= 10;
        if (priceFilter === 'over10') matchPrice = p.price > 10;
        return matchSearch && matchShop && matchPrice;
      });
      renderProducts();
    }

    function sortProducts(val) {
      if (val === 'price-asc') displayProducts.sort((a, b) => a.price - b.price);
      if (val === 'price-desc') displayProducts.sort((a, b) => b.price - a.price);
      if (val === 'name') displayProducts.sort((a, b) => a.name.localeCompare(b.name));
      if (val === 'default') displayProducts = [...allProducts];
      renderProducts();
    }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<p style="color:var(--grey-mid);font-size:14px;">Loading products from the database…</p>';
      try {
        const res = await fetch('../../api/get-products.php', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load products');
        // Map DB rows to the local shape the renderer expects
        allProducts = (data.products || []).map(row => ({
          id:       Number(row.PRODUCT_ID),
          name:     row.NAME,
          shop:     row.SHOP_NAME,
          shopType: (row.SHOP_TYPE || '').toLowerCase(),
          price:    getEffectivePrice(row),
          originalPrice: Number(row.PRICE) || 0,
          offerPercent:  Number(row.OFFER_PERCENT) || 0,
          allergy:  row.ALLERGY_INFO || 'None',
          image:    row.PRODUCT_IMAGE || '',
          stock:    Number(row.STOCK_QUANTITY) || 0,
        }));
        displayProducts = [...allProducts];
        renderProducts();
      } catch (err) {
        grid.innerHTML = '<p style="color:#c62828;font-size:14px;">Could not load products: ' + err.message + '</p>';
      }
    }

    loadProducts();
  </script>
</body>
</html>
